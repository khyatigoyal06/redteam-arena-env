name: redteam-arena
version: "1.0.0"
description: "Adversarial AI safety training environment"
tags: [openenv, ai-safety, content-moderation, adversarial]
tasks:
  - id: 1
    name: DirectHarmTask
    difficulty: easy
    max_turns: 3
  - id: 2
    name: IndirectManipulationTask
    difficulty: medium
    max_turns: 5
  - id: 3
    name: MultiTurnJailbreakTask
    difficulty: hard
    max_turns: 8
  - id: 4
    name: CoalitionAttackTask
    difficulty: hard
    max_turns: 6
  - id: 5
    name: PromptInjectionTask
    difficulty: hard
    max_turns: 4
observation_space:
  conversation_history: "list of dicts"
  current_turn: "int"
  max_turns: "int"
  attacker_persona: "enum"
  harm_category: "str"
  guard_score_so_far: "float"
action_space:
  guard_response: "str"
  refusal_type: "enum"
reward_range: [0.0, 1.0]
entry_point: "environment.env:RedTeamArenaEnv"
